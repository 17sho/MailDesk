name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Ruff
        run: python -m ruff check src tests build.py release.py
      - name: Test
        run: python -m pytest -q
      - name: Build v0.3.9 onedir recovery launcher
        shell: powershell
        run: |
          & .\tools\windows_update_recovery\build.ps1
          $launcher = Get-Item artifacts\MailDesk-v0.3.9-onedir-update-launcher.exe
          if ($launcher.Length -gt 32768) {
            throw "Recovery launcher unexpectedly exceeds 32 KiB"
          }
